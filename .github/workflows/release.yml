name: Release

on:
  push:
    branches:
      - main  # stable releases -> TestPyPI + PyPI
      - rc     # release candidates -> TestPyPI only
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # Full lint + type check + unit + e2e suite (the same reusable workflow the
  # CI workflow runs on PRs). A release cannot proceed unless this is green.
  test:
    uses: ./.github/workflows/test.yml

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      is_prerelease: ${{ steps.semantic.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: false
          vcs_release: true
          tag: true
          commit: true
          push: true
          verbosity: 2

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    continue-on-error: true
    environment:
      name: testpypi
      url: https://test.pypi.org/project/chantal/

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    # Stable releases only - prereleases (rc) never reach PyPI.
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease == 'false'
    environment:
      name: pypi
      url: https://pypi.org/project/chantal/

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
